[package]
name = "koine-proto"
description = "Koiné wire contract: versioned protobuf definitions and generated gRPC types."
publish = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
prost = "0.14"
tonic = { version = "0.14", default-features = false, features = ["codegen", "transport"] }
tonic-prost = "0.14"

[build-dependencies]
protoc-bin-vendored = "=3.2.0"
tonic-prost-build = "0.14"

# `prost` and `tonic-prost` are only referenced from the code
# `tonic::include_proto!` (src/lib.rs) pulls in via `include!()` at compile
# time from OUT_DIR; cargo-machete's static source scan never sees that
# generated file, so it flags both as unused. False positive, not dead
# weight — see phase-2-carryover-hardening AC3.
[package.metadata.cargo-machete]
ignored = ["prost", "tonic-prost"]

[lints]
workspace = true
